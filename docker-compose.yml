services:
  postgres:
    image: postgres:16-alpine
    container_name: salesflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salesflow_crm
    ports:
      - "5432:5432"
    volumes:
      - salesflow_pg_data:/var/lib/postgresql/data

volumes:
  salesflow_pg_data:
