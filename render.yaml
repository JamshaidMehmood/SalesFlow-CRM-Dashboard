# Render Blueprint for SalesFlow CRM Dashboard.
# One free web service serves both the Express API and the built React frontend,
# backed by a free managed PostgreSQL database.
#
# Deploy: push this repo to GitHub, then on Render go to
#   New +  ->  Blueprint  ->  pick this repo. Render reads this file and
# provisions everything automatically.
databases:
  - name: salesflow-crm-db
    plan: free

services:
  - type: web
    name: salesflow-crm-jamshaid
    runtime: node
    plan: free
    # Build the frontend, install the backend, generate the Prisma client, sync
    # the schema, then seed demo data on first deploy (only if the DB is empty).
    # NODE_ENV=production makes npm skip devDependencies, but the build needs
    # them (vite, @vitejs/plugin-react, tailwind, prisma CLI) -> force with
    # --include=dev on both installs.
    buildCommand: >-
      npm install --include=dev --prefix crm-dashboard-frontend &&
      npm run build --prefix crm-dashboard-frontend &&
      npm install --include=dev --prefix crm-dashboard-backend &&
      npx --prefix crm-dashboard-backend prisma generate --schema crm-dashboard-backend/prisma/schema.prisma &&
      npx --prefix crm-dashboard-backend prisma db push --schema crm-dashboard-backend/prisma/schema.prisma --accept-data-loss &&
      node crm-dashboard-backend/prisma/seed-if-empty.js
    startCommand: npm start --prefix crm-dashboard-backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: salesflow-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Google OAuth Client ID (public, not a secret) enables Google Sign-In.
      # The backend exposes it at /api/auth/config and the frontend reads it at
      # runtime, so no frontend rebuild is needed to change it.
      # NOTE: add your deployed URL (e.g. https://salesflow-crm.onrender.com) to
      # this client's "Authorized JavaScript origins" in Google Cloud Console,
      # or Google will block the sign-in with an origin mismatch.
      - key: GOOGLE_CLIENT_ID
        value: "533214155192-e4l7prqseb9g850i2ha6f2jjhuq1voh4.apps.googleusercontent.com"
