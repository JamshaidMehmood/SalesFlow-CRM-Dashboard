# Render Blueprint for SalesFlow CRM Dashboard.
# One free web service serves both the Express API and the built React frontend,
# backed by a free managed PostgreSQL database.
#
# Deploy: push this repo to GitHub, then on Render go to
#   New +  ->  Blueprint  ->  pick this repo. Render reads this file and
# provisions everything automatically.
databases:
  - name: salesflow-crm-db
    plan: free

services:
  - type: web
    name: salesflow-crm
    runtime: node
    plan: free
    # Build the frontend, install the backend, generate the Prisma client, and
    # sync the schema to the fresh database.
    buildCommand: >-
      npm install --prefix crm-dashboard-frontend &&
      npm run build --prefix crm-dashboard-frontend &&
      npm install --prefix crm-dashboard-backend &&
      npx --prefix crm-dashboard-backend prisma generate --schema crm-dashboard-backend/prisma/schema.prisma &&
      npx --prefix crm-dashboard-backend prisma db push --schema crm-dashboard-backend/prisma/schema.prisma --accept-data-loss
    startCommand: npm start --prefix crm-dashboard-backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: salesflow-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Optional: set to your Google OAuth Client ID to enable Google Sign-In.
      # Leave unset to use email/password login only.
      - key: GOOGLE_CLIENT_ID
        sync: false
